# Nginx site for Execution Cockpit (dhandadiary.cloud).
# Certbot rewrites this to add the :443 TLS block + HTTP->HTTPS redirect (Step: certbot --nginx).
# Install: sudo cp deploy/nginx-cockpit.conf /etc/nginx/sites-available/cockpit
#          sudo ln -s /etc/nginx/sites-available/cockpit /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default && sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name dhandadiary.cloud www.dhandadiary.cloud;

    root /var/www/dhandadiary/public;
    index index.php;
    charset utf-8;

    # PWA service worker must be served from root scope with no long cache.
    location = /sw.js            { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /push-sw.js       { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { try_files $uri =404; }

    location / { try_files $uri $uri/ /index.php?$query_string; }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:18000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* { deny all; }

    client_max_body_size 20M;
}
