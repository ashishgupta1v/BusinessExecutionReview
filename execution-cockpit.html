<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Execution Cockpit</title>
<style>
:root{
  --indigo:#4f46e5; --indigo-d:#4338ca; --indigo-l:#eef2ff;
  --slate-900:#0f172a; --slate-800:#1e293b; --slate-700:#334155; --slate-500:#64748b;
  --slate-400:#94a3b8; --slate-300:#cbd5e1; --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
  --green:#059669; --green-l:#d1fae5; --amber:#d97706; --amber-l:#fef3c7; --rose:#e11d48; --rose-l:#ffe4e6;
  --white:#fff; --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow-lg:0 10px 30px -12px rgba(15,23,42,.25); --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--slate-100);color:var(--slate-800);font-size:15px;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--slate-800);border:1px solid var(--slate-200);border-radius:10px;padding:9px 11px;width:100%;background:#fff;outline:none;transition:.15s}
input:focus,textarea:focus,select:focus{border-color:var(--indigo);box-shadow:0 0 0 3px var(--indigo-l)}
textarea{resize:vertical}
.app{display:flex;min-height:100%}
/* sidebar */
.sidebar{width:248px;background:linear-gradient(180deg,#111827,#0b1020);color:var(--slate-300);padding:18px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:0 4px}
.brand .logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#4338ca);display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 6px 16px -6px #4f46e5}
.brand b{color:#fff;font-size:15px;display:block;line-height:1.1}
.brand span{font-size:12px;color:var(--slate-400)}
.streakbox{margin:2px 4px 14px;padding:12px;border-radius:14px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25)}
.streakbox .lbl{font-size:11px;color:var(--slate-400);text-transform:uppercase;letter-spacing:.04em}
.streakbox .num{font-size:26px;font-weight:800;color:#fff}
.streakbox .num small{font-size:13px;font-weight:400;color:var(--slate-400)}
.navbtn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:9px 12px;border-radius:12px;margin-bottom:3px;color:var(--slate-300);transition:.15s}
.navbtn .ic{width:24px;height:24px;display:grid;place-items:center;font-size:15px;border-radius:8px;background:rgba(255,255,255,.05)}
.navbtn .nlbl{display:flex;flex-direction:column;line-height:1.15}
.navbtn .nlbl b{font-weight:600;font-size:14px}
.navbtn .nlbl em{font-style:normal;font-size:10px;color:var(--slate-500);text-transform:uppercase;letter-spacing:.03em}
.navbtn:hover{background:rgba(255,255,255,.06);color:#fff}
.navbtn.active{background:var(--indigo);color:#fff;box-shadow:0 8px 20px -10px #4f46e5}
.navbtn.active .ic{background:rgba(255,255,255,.18)} .navbtn.active .nlbl em{color:#c7d2fe}
.side-foot{margin-top:auto;font-size:11px;color:var(--slate-500);padding:12px 4px 0}
/* main */
.main{flex:1;min-width:0;padding-bottom:80px}
.topbar{display:none}
.wrap{max-width:820px;margin:0 auto;padding:22px 18px 44px}
.pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
h1.page{font-size:24px;font-weight:800;color:var(--slate-900);letter-spacing:-.01em}
.sub{color:var(--slate-500);font-size:13px;margin-top:3px}
.cadence{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--indigo);background:var(--indigo-l);padding:3px 9px;border-radius:999px;margin-top:6px;display:inline-block}
.card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-top:16px}
.card .h{font-weight:700;margin-bottom:10px;font-size:14px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.card .h .lead{display:flex;align-items:center;gap:8px}
.muted{color:var(--slate-400);font-weight:400;font-size:12px}
.pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;display:inline-block}
.p-slate{background:var(--slate-100);color:var(--slate-500)} .p-green{background:var(--green-l);color:var(--green)}
.p-amber{background:var(--amber-l);color:var(--amber)} .p-rose{background:var(--rose-l);color:var(--rose)} .p-indigo{background:var(--indigo-l);color:var(--indigo)}
.item{display:flex;align-items:center;gap:8px;border-radius:10px;padding:9px 11px;font-size:14px;margin-bottom:7px;transition:.15s}
.item.green{background:#ecfdf5} .item.amber{background:#fffbeb}
.item .x{color:var(--slate-300);font-size:16px;line-height:1;padding:2px 4px}.item .x:hover{color:var(--rose)}
.addrow{display:flex;gap:7px;margin-top:2px}.addrow input{flex:1}
.btn{background:var(--indigo);color:#fff;border-radius:10px;padding:9px 14px;font-weight:600;font-size:14px;transition:.15s}
.btn:hover{background:var(--indigo-d)}.btn:active{transform:scale(.98)}
.btn.green{background:var(--green)} .btn.amber{background:var(--amber)} .btn.sm{padding:8px 11px;font-size:13px}
.btn-big{width:100%;padding:14px;border-radius:14px;font-size:16px;font-weight:700;box-shadow:var(--shadow-lg)}
.btn-ghost{color:var(--indigo);font-size:13px;font-weight:600;padding:4px 2px}
.chk{width:20px;height:20px;accent-color:var(--indigo);flex-shrink:0}
.pri{display:flex;align-items:center;gap:8px;margin-bottom:7px}.pri .n{color:var(--slate-400);width:18px;font-size:13px}
.r5{display:flex;gap:8px;margin-bottom:12px}
.r5 button{flex:1;height:46px;border-radius:12px;border:2px solid var(--slate-200);color:var(--slate-300);font-weight:800;font-size:15px;transition:.15s}
.r5 button.on{background:linear-gradient(135deg,#6366f1,#4338ca);border-color:transparent;color:#fff;box-shadow:0 6px 14px -8px #4f46e5}
.disc2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.disc2 label{display:flex;align-items:center;gap:8px;border:1px solid var(--slate-200);border-radius:12px;padding:11px;font-size:13px;cursor:pointer;transition:.15s}
.disc2 label.on{background:#ecfdf5;border-color:#a7f3d0}
/* board */
.board{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:720px){.board{grid-template-columns:1fr 1fr 1fr}}
.col{border-radius:var(--radius);padding:12px;min-height:120px;transition:.15s}
.col.todo{background:var(--slate-100)} .col.doing{background:#fffbeb} .col.done{background:#ecfdf5}
.col .ch{display:flex;justify-content:space-between;font-weight:700;font-size:13px;padding:2px 4px 8px}.col .ch .cnt{color:var(--slate-400);font-weight:500}
.kcard{background:#fff;border:1px solid var(--slate-200);border-radius:12px;padding:11px;margin-bottom:8px;box-shadow:var(--shadow);font-size:14px;cursor:grab;transition:.12s}
.kcard:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.kcard.stale{border-color:#fda4af}
.kcard .top{display:flex;justify-content:space-between;gap:6px}
.kcard .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.kcard .mv{display:flex;gap:6px;margin-top:8px;align-items:center}
.kcard .mv .to{margin-left:auto;color:var(--indigo);font-size:12px;font-weight:600}.kcard .mv .bk{color:var(--slate-400);font-size:13px}
.col.drag{outline:2px dashed var(--indigo);outline-offset:-4px;background:var(--indigo-l)}
/* kpi */
.kpi .line{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.kpi .unit{color:var(--slate-400);font-size:13px}.kpi input.act{width:96px}
.trend{width:100%;height:auto;display:block;margin-top:10px;overflow:visible}
/* charts */
.grid2{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}
@media(min-width:640px){.grid2{grid-template-columns:1fr 1fr}}
.donutwrap{display:flex;align-items:center;gap:16px}
.donut{width:118px;height:118px;border-radius:50%;display:grid;place-items:center;flex-shrink:0}
.donut-hole{width:84px;height:84px;background:#fff;border-radius:50%;display:grid;place-items:center;text-align:center}
.donut-hole .dv{font-size:22px;font-weight:800;line-height:1}.donut-hole .ds{font-size:10px;color:var(--slate-500)}
.legend2{display:flex;flex-direction:column;gap:6px;font-size:13px}
.legend2 .lg{display:flex;align-items:center;gap:7px}.legend2 .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.hbar{margin-bottom:12px}
.hbar-l{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}.hbar-l span{color:var(--slate-400);font-variant-numeric:tabular-nums}
.hbar-t{height:10px;background:var(--slate-100);border-radius:99px;overflow:hidden}
.hbar-f{height:100%;border-radius:99px;width:0;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.stackbar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin-top:6px;font-size:11px;color:#fff;font-weight:700}
.stackbar div{display:grid;place-items:center;transition:flex .6s ease}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
@media(min-width:560px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;text-align:center}
.stat .v{font-size:26px;font-weight:800}.stat .l{font-size:11px;color:var(--slate-500);margin-top:2px}
.heat{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px}
.heat .wk{display:flex;flex-direction:column;gap:3px}
.heat .d{width:15px;height:15px;border-radius:3px;background:var(--slate-200)}
.heat .d.l1{background:#c7d2fe}.heat .d.l2{background:#a5b4fc}.heat .d.l3{background:#6366f1}.heat .d.l4{background:#4338ca}
.legend{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--slate-400);margin-top:10px}.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
.spark{flex:1;display:flex;align-items:flex-end;gap:3px;height:38px;justify-content:flex-end;min-width:60px}
.spark i{width:11px;border-radius:3px 3px 0 0;display:block}.spark i.ok{background:#6ee7b7}.spark i.bad{background:#fda4af}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}
.chip{font-size:12px;padding:5px 12px;border-radius:999px;background:#fff;border:1px solid var(--slate-200);color:var(--slate-500)}.chip.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
/* bottom nav */
.bnav{display:none}
@media(max-width:719px){
  .sidebar{display:none}
  .topbar{display:flex;position:sticky;top:0;z-index:10;background:var(--slate-900);color:#fff;padding:12px 16px;justify-content:space-between;align-items:center;font-weight:700}
  .bnav{display:grid;grid-template-columns:repeat(6,1fr);position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--slate-200);z-index:20;box-shadow:0 -4px 16px -8px rgba(0,0,0,.15)}
  .bnav button{padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9.5px;color:var(--slate-400)}
  .bnav button .ic{font-size:17px}.bnav button.active{color:var(--indigo)}
  .wrap{padding:16px 14px 40px}
}
.fadein{animation:fi .22s ease-out}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.grow{animation:none}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main"><div class="topbar" id="topbar"></div><div class="wrap"><div id="view"></div></div></main>
</div>
<nav class="bnav" id="bnav"></nav>
<script>
/* ============ helpers ============ */
var KEY="execution_cockpit_v3";
function today(){return new Date().toISOString().slice(0,10);}
function addDays(iso,n){return new Date(new Date(iso).getTime()+n*86400000).toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function fmt(iso){var d=new Date(iso+"T00:00:00");return d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function isoWeek(d){d=d?new Date(d):new Date();var dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var dn=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-dn+3);var ft=new Date(Date.UTC(dt.getUTCFullYear(),0,4));var wk=1+Math.round(((dt-ft)/86400000-3+((ft.getUTCDay()+6)%7))/7);return{year:dt.getUTCFullYear(),week:wk};}
function weekKey(d){var w=isoWeek(d);return w.year+"-W"+String(w.week).padStart(2,'0');}

var KPI_SEED={"Retail / Shop":[["Daily Sales","₹",25000,"up"],["Footfall","",60,"up"],["Avg Bill Value","₹",450,"up"],["Repeat Customers","",15,"up"]],
"Services / Agency":[["Sales Calls","",20,"up"],["Proposals Sent","",5,"up"],["Deals Closed","",2,"up"],["Collections","₹",100000,"up"]],
"Manufacturing / Distribution":[["Units Produced","",500,"up"],["New Distributors","",2,"up"],["Order Fulfilment","%",95,"up"],["Wastage","%",3,"down"]]};

/* ============ state ============ */
var S=load();
function load(){try{var r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return seed();}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function seed(){
  var t=today();
  var dcr={},disc={};
  var done=["18 sales calls made","Followed up 8 leads","Closed 1 deal","Shipped ad creative","Met 2 distributors","Sent 4 proposals"];
  var gaps=[3,9,13];
  for(var n=17;n>=1;n--){
    if(gaps.indexOf(n)>=0)continue;
    var day=addDays(t,-n);
    dcr[day]={completed:[{id:uid(),t:done[n%done.length]}],pending:(n%4===0?[{id:uid(),t:"Follow up pending invoice",deadline:t}]:[]),priorities:["Priority focus for the day"],needle:n%2===0,note:""};
    disc[day]={r5:[1,1,(n%2?1:0),(n%3?1:0),(n%5?0:1)],two:1,tb:(n%2)};
  }
  var kpis=KPI_SEED["Services / Agency"].map(function(k){return{id:uid(),name:k[0],unit:k[1],target:k[2],dir:k[3]};});
  var kpiActuals={};
  kpis.forEach(function(k){var m={};for(var w=6;w>=1;w--){var wkk=weekKey(addDays(t,-7*w));var noise=(((w*37)%40)-16)/100;m[wkk]=Math.max(0,Math.round(k.target*(1+noise)));}kpiActuals[k.id]=m;});
  return {
    profile:{name:"My Business",type:"Services / Agency",staleDays:3},
    dcr:dcr,disc:disc,
    kanban:{todo:[{id:uid(),title:"Client Proposal X",created:t},{id:uid(),title:"Vendor negotiation",created:t}],
      doing:[{id:uid(),title:"New Product Design",created:addDays(t,-5),enteredAt:addDays(t,-5)}],
      done:[{id:uid(),title:"Marketing Plan",created:addDays(t,-2)},{id:uid(),title:"Website copy",created:addDays(t,-1)}]},
    kpis:kpis,kpiActuals:kpiActuals,weekly:{},
    feedback:[
      {id:uid(),date:addDays(t,-8),type:"Suggestion",body:"Add online payment option",action:"Checking with gateway",assignee:"Ops",status:"Pending"},
      {id:uid(),date:addDays(t,-5),type:"Positive",body:"Fast delivery, great packaging",action:"Shared with team",assignee:"Sales",status:"Done"},
      {id:uid(),date:addDays(t,-2),type:"Negative",body:"Support response was slow",action:"Reviewing SLA",assignee:"Support",status:"Pending"}
    ]
  };
}
function streak(){var d=S.dcr,dates=Object.keys(d).sort(),longest=0,run=0,prev=null;for(var i=0;i<dates.length;i++){if(prev&&daysBetween(prev,dates[i])===1)run++;else run=1;longest=Math.max(longest,run);prev=dates[i];}var cur=today(),c=0;while(d[cur]){c++;cur=addDays(cur,-1);}return{current:c,longest:longest};}

/* ============ SVG / CSS chart toolkit (zero dependencies) ============ */
function donut(segments,center,sub){
  var stops="",acc=0;
  segments.forEach(function(s){if(s.pct<=0)return;stops+=s.color+" "+acc+"% "+(acc+s.pct)+"%,";acc+=s.pct;});
  stops+= (acc<100? "var(--slate-200) "+acc+"% 100%" : "").replace(/,$/,"");
  if(stops.slice(-1)===",")stops=stops.slice(0,-1);
  return '<div class="donut" style="background:conic-gradient('+stops+')"><div class="donut-hole"><div><div class="dv">'+center+'</div><div class="ds">'+sub+'</div></div></div></div>';
}
function legend(items){return '<div class="legend2">'+items.map(function(i){return '<div class="lg"><span class="dot" style="background:'+i.color+'"></span>'+i.label+'</div>';}).join('')+'</div>';}
function hbar(label,actual,target,dir){var good=dir==='up'?actual>=target:actual<=target;var pct=target?Math.min(100,Math.round(actual/target*100)):0;var col=good?'var(--green)':'#f59e0b';return '<div class="hbar"><div class="hbar-l"><span>'+esc(label)+'</span><span>'+actual+' / '+target+'</span></div><div class="hbar-t"><div class="hbar-f" style="width:'+pct+'%;background:'+col+'"></div></div></div>';}
function trend(points,target,color){
  if(!points.length)return '';
  var w=320,h=96,pad=8;
  var vals=points.concat([target]);
  var max=Math.max.apply(null,vals)*1.12||1,min=Math.min.apply(null,vals)*0.88;
  var rng=(max-min)||1;
  var xs=function(i){return pad+i*(w-2*pad)/Math.max(1,points.length-1);};
  var ys=function(v){return h-pad-(v-min)/rng*(h-2*pad);};
  var line=points.map(function(v,i){return (i?'L':'M')+xs(i).toFixed(1)+' '+ys(v).toFixed(1);}).join(' ');
  var area=line+' L '+xs(points.length-1).toFixed(1)+' '+(h-pad)+' L '+xs(0).toFixed(1)+' '+(h-pad)+' Z';
  var ty=ys(target).toFixed(1);
  return '<svg viewBox="0 0 '+w+' '+h+'" class="trend">'+
    '<path d="'+area+'" fill="'+color+'" opacity="0.12"/>'+
    '<line x1="0" y1="'+ty+'" x2="'+w+'" y2="'+ty+'" stroke="var(--slate-300)" stroke-width="1" stroke-dasharray="4 4"/>'+
    '<text x="'+(w-2)+'" y="'+(ty-4)+'" text-anchor="end" font-size="9" fill="var(--slate-400)">target</text>'+
    '<path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+
    points.map(function(v,i){return '<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(v).toFixed(1)+'" r="2.8" fill="#fff" stroke="'+color+'" stroke-width="2"/>';}).join('')+
    '</svg>';
}

/* ============ nav / shell ============ */
var NAV=[
 ["today","Day Close Report","◉","Daily","DCR"],
 ["weekly","Weekly Review","✎","Weekly","Review"],
 ["kpi","KPI Tracker","▦","Weekly","KPIs"],
 ["feedback","Feedback Log","✉","Monthly","Feedback"],
 ["board","Kanban Board","▤","Ongoing","Kanban"],
 ["overview","Overview","✦","Live","Overview"]
];
var current="today";
function go(v){current=v;draft=null;render();window.scrollTo(0,0);}
function meta(id){for(var i=0;i<NAV.length;i++)if(NAV[i][0]===id)return NAV[i];return NAV[0];}
function renderShell(){
  var st=streak();
  document.getElementById('sidebar').innerHTML=
    '<div class="brand"><div class="logo">EC</div><div><b>Execution</b><span>Cockpit</span></div></div>'+
    '<div class="streakbox"><div class="lbl">Current streak</div><div class="num">'+st.current+' <small>days 🔥</small></div></div>'+
    NAV.map(function(n){return '<button class="navbtn'+(current===n[0]?' active':'')+'" data-go="'+n[0]+'"><span class="ic">'+n[2]+'</span><span class="nlbl"><b>'+n[1]+'</b><em>'+n[3]+'</em></span></button>';}).join('')+
    '<div class="side-foot">'+esc(S.profile.name)+' · '+esc(S.profile.type)+'</div>';
  document.getElementById('topbar').innerHTML='<span>'+meta(current)[1]+'</span><span>'+st.current+'🔥</span>';
  document.getElementById('bnav').innerHTML=NAV.map(function(n){return '<button class="'+(current===n[0]?'active':'')+'" data-go="'+n[0]+'"><span class="ic">'+n[2]+'</span>'+n[4]+'</button>';}).join('');
}
function head(title,sub){var m=meta(current);return '<div class="pagehead"><div><h1 class="page">'+title+'</h1><div class="sub">'+sub+'</div><span class="cadence">'+m[3]+' cadence</span></div></div>';}
function render(){
  renderShell();
  var el=document.getElementById('view');el.className='fadein';
  el.innerHTML=({today:viewToday,weekly:viewWeekly,kpi:viewKpi,feedback:viewFeedback,board:viewBoard,overview:viewOverview})[current]();
  wire();
}

/* ============ 1 · TODAY / DCR ============ */
var draft=null;
function initDraft(){var t=today(),e=S.dcr[t];draft=e?JSON.parse(JSON.stringify(e)):{completed:[],pending:[],priorities:[""],needle:false,note:""};if(!draft.priorities.length)draft.priorities=[""];}
function viewToday(){
  if(!draft)initDraft();
  var t=today(),filed=!!S.dcr[t],d=draft;
  var disc=S.disc[t]||{r5:[0,0,0,0,0],two:0,tb:0};
  var r5c=disc.r5.reduce(function(a,b){return a+b;},0);
  return head("Day Close Report",fmt(t)+" · file in under 90 seconds")+
    (filed?'<div style="margin-top:-30px;text-align:right"><span class="pill p-green">Filed ✓</span></div>':'')+
    '<div class="card"><div class="h"><span class="lead">✅ Tasks completed</span></div>'+
      d.completed.map(function(c){return '<div class="item green"><span style="flex:1">'+esc(c.t)+'</span><button class="x" data-del-done="'+c.id+'">×</button></div>';}).join('')+
      '<div class="addrow"><input id="in-done" placeholder="e.g. 18 sales calls made"><button class="btn green sm" data-add-done>Add</button></div></div>'+
    '<div class="card"><div class="h"><span class="lead">⏳ Pending / carried over</span><span class="muted">→ auto-adds to Kanban</span></div>'+
      d.pending.map(function(c){return '<div class="item amber"><span style="flex:1">'+esc(c.t)+'</span><input type="date" style="width:140px" value="'+(c.deadline||t)+'" data-pdate="'+c.id+'"><button class="x" data-del-pend="'+c.id+'">×</button></div>';}).join('')+
      '<div class="addrow"><input id="in-pend" placeholder="e.g. Send Distributor Z proposal"><button class="btn amber sm" data-add-pend>Add</button></div></div>'+
    '<div class="card"><div class="h"><span class="lead">🎯 Tomorrow’s top priorities</span><span class="muted">max 5</span></div>'+
      d.priorities.map(function(p,i){return '<div class="pri"><span class="n">'+(i+1)+'.</span><input data-pri="'+i+'" value="'+esc(p)+'">'+(d.priorities.length>1?'<button class="x" data-del-pri="'+i+'">×</button>':'')+'</div>';}).join('')+
      (d.priorities.length<5?'<button class="btn-ghost" data-add-pri>+ add priority</button>':'')+'</div>'+
    '<div class="card"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600"><input type="checkbox" class="chk" id="cx-needle"'+(d.needle?' checked':'')+'> Did today move the needle?</label>'+
      '<textarea id="tx-note" rows="2" placeholder="One line of reflection…" style="margin-top:10px">'+esc(d.note)+'</textarea></div>'+
    '<div style="margin-top:16px"><button class="btn btn-big" data-file>'+(filed?'Update Day Close Report':'File Day Close Report')+'</button></div>'+
    '<div class="card"><div class="h"><span class="lead">⚡ Discipline checklist</span><span class="pill '+(r5c===5?'p-green':'p-slate')+'">'+r5c+'/5 Rule of 5</span></div>'+
      '<div class="r5">'+disc.r5.map(function(v,i){return '<button class="'+(v?'on':'')+'" data-r5="'+i+'">'+(i+1)+'</button>';}).join('')+'</div>'+
      '<div class="disc2"><label class="'+(disc.two?'on':'')+'"><input type="checkbox" class="chk" data-disc="two"'+(disc.two?' checked':'')+'> 2-Minute rule</label>'+
      '<label class="'+(disc.tb?'on':'')+'"><input type="checkbox" class="chk" data-disc="tb"'+(disc.tb?' checked':'')+'> Time-blocked</label></div></div>';
}

/* ============ 2 · WEEKLY REVIEW ============ */
function viewWeekly(){
  var wk=weekKey();
  var wd=Object.keys(S.dcr).filter(function(d){return weekKey(d)===wk;});
  var achieved=[],chall=[],needleDays=0;
  wd.forEach(function(d){S.dcr[d].completed.forEach(function(c){achieved.push(c.t);});S.dcr[d].pending.forEach(function(c){chall.push(c.t);});if(S.dcr[d].needle)needleDays++;});
  var ex=S.weekly[wk]||{};
  var f={planned:ex.planned||"",achieved:ex.achieved||achieved.join("\n"),wins:ex.wins||"",challenges:ex.challenges||chall.join("\n"),needle:ex.needle||"",focus:ex.focus||""};
  var done=ex.status==='complete';
  function fld(lbl,k,ph,rows){return '<div class="card"><div class="h"><span class="lead">'+lbl+'</span></div><textarea data-wk="'+k+'" rows="'+(rows||3)+'" placeholder="'+ph+'">'+esc(f[k])+'</textarea></div>';}
  var summary='<div class="card"><div class="h"><span class="lead">This week at a glance</span></div><div class="stats" style="margin-top:0">'+
    '<div class="stat"><div class="v" style="color:var(--indigo)">'+wd.length+'</div><div class="l">DCRs filed</div></div>'+
    '<div class="stat"><div class="v" style="color:var(--green)">'+achieved.length+'</div><div class="l">tasks done</div></div>'+
    '<div class="stat"><div class="v" style="color:var(--amber)">'+chall.length+'</div><div class="l">carried over</div></div>'+
    '<div class="stat"><div class="v">'+needleDays+'</div><div class="l">needle days</div></div></div></div>';
  return head("Weekly Review",wk+" · prefilled from "+wd.length+" DCRs")+
    (done?'<div style="margin-top:-30px;text-align:right"><span class="pill p-green">Complete ✓</span></div>':'')+
    summary+
    fld('📋 Planned goals','planned','What did you set out to do this week?')+
    fld('✅ Achieved (rolled up from DCRs)','achieved','one per line')+
    fld('🏆 Major wins','wins','2 new distributors onboarded…')+
    fld('⚠️ Challenges (from pending items)','challenges','one per line')+
    fld('🎯 What moved the needle this week?','needle','The one thing that mattered most',2)+
    fld('➡️ Next week focus (top 3)','focus','one per line')+
    '<div style="margin-top:16px"><button class="btn btn-big" data-savewk="'+wk+'">'+(done?'Update review':'Complete weekly review')+'</button></div>';
}

/* ============ 3 · KPI TRACKER ============ */
function viewKpi(){
  var wk=weekKey();
  var onTarget=0;
  S.kpis.forEach(function(k){var raw=(S.kpiActuals[k.id]||{})[wk];if(raw!==undefined&&raw!==""){var a=Number(raw);if(k.dir==='up'?a>=k.target:a<=k.target)onTarget++;}});
  var head2=head("KPI Tracker",wk+" · enter this week’s actuals, variance colours itself");
  return head2+
   '<div class="kpi">'+S.kpis.map(function(k){
     var acts=S.kpiActuals[k.id]||{};var raw=acts[wk];var has=raw!==undefined&&raw!=="";var a=Number(raw);
     var good=k.dir==='up'?a>=k.target:a<=k.target;var v=a-k.target;var pct=k.target?Math.round((v/k.target)*100):0;
     var hist=Object.keys(acts).sort();var pts=hist.map(function(w){return Number(acts[w]);});
     return '<div class="card"><div class="h"><span class="lead">'+esc(k.name)+' <span class="muted">target '+esc(k.unit)+k.target+' · '+(k.dir==='up'?'higher better':'lower better')+'</span></span><button class="x" data-delkpi="'+k.id+'">×</button></div>'+
       '<div class="line"><span class="unit">'+esc(k.unit)+'</span><input class="act" type="number" placeholder="actual" value="'+(has?esc(raw):'')+'" data-kpi="'+k.id+'">'+
       (has?'<span class="pill '+(good?'p-green':'p-rose')+'">'+(v>=0?'+':'')+v+' ('+(pct>=0?'+':'')+pct+'%)</span>':'<span class="muted">enter to see variance</span>')+'</div>'+
       trend(pts,k.target,good||!has?'#4f46e5':'#e11d48')+'</div>';
   }).join('')+'</div>'+
   '<div class="card" id="kpi-add" style="display:none"><div class="h">New KPI</div>'+
     '<div class="addrow"><input id="nk-name" placeholder="KPI name"></div>'+
     '<div class="addrow" style="margin-top:7px"><input id="nk-unit" placeholder="unit" style="width:80px"><input id="nk-target" type="number" placeholder="target" style="width:100px"><select id="nk-dir" style="width:auto"><option value="up">higher better</option><option value="down">lower better</option></select><button class="btn sm" data-savekpi>Add</button></div></div>'+
   '<button class="btn-ghost" data-showkpi style="margin-top:12px">+ add KPI</button>';
}

/* ============ 4 · FEEDBACK ============ */
var fbFilter="All";
function viewFeedback(){
  var rows=S.feedback.filter(function(r){return fbFilter==='All'||r.status===fbFilter||r.type===fbFilter;});
  function tone(t){return t==='Positive'?'p-green':t==='Negative'?'p-rose':'p-indigo';}
  var pend=S.feedback.filter(function(r){return r.status==='Pending';}).length;
  var doneN=S.feedback.length-pend;
  var pos=S.feedback.filter(function(r){return r.type==='Positive';}).length;
  var neg=S.feedback.filter(function(r){return r.type==='Negative';}).length;
  var sug=S.feedback.filter(function(r){return r.type==='Suggestion';}).length;
  var tot=S.feedback.length||1;
  var glance='<div class="card"><div class="h"><span class="lead">Monthly action view</span><span class="muted">'+pend+' open · '+doneN+' closed</span></div><div class="donutwrap">'+
    donut([{pct:Math.round(doneN/tot*100),color:'var(--green)'},{pct:Math.round(pend/tot*100),color:'var(--amber)'}],Math.round(doneN/tot*100)+'%','closed')+
    legend([{color:'var(--green)',label:'Done · '+doneN},{color:'var(--amber)',label:'Pending · '+pend},{color:'var(--indigo)',label:'Positive '+pos+' / Suggestion '+sug+' / Negative '+neg}])+'</div></div>';
  return head("Feedback Log","capture insight, assign an owner, close the loop")+
    glance+
    '<div class="card"><div class="addrow"><select id="fb-type" style="width:auto"><option>Positive</option><option>Negative</option><option selected>Suggestion</option></select><input id="fb-assign" placeholder="Assign to"></div>'+
      '<div class="addrow" style="margin-top:7px"><input id="fb-body" placeholder="Feedback…"></div>'+
      '<div class="addrow" style="margin-top:7px"><input id="fb-action" placeholder="Action taken…"></div>'+
      '<button class="btn" style="width:100%;margin-top:9px" data-addfb>Log feedback</button></div>'+
    '<div class="chips">'+["All","Pending","Done","Positive","Negative","Suggestion"].map(function(x){return '<button class="chip'+(fbFilter===x?' on':'')+'" data-filter="'+x+'">'+x+'</button>';}).join('')+'</div>'+
    rows.map(function(r){return '<div class="card" style="margin-top:10px"><div class="pagehead" style="gap:8px"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="pill '+tone(r.type)+'">'+r.type+'</span><span class="muted">'+fmt(r.date)+(r.assignee?' · '+esc(r.assignee):'')+'</span></div>'+
      '<div style="display:flex;gap:8px;align-items:center"><button data-togfb="'+r.id+'"><span class="pill '+(r.status==='Done'?'p-green':'p-amber')+'">'+r.status+'</span></button><button class="x" data-delfb="'+r.id+'">×</button></div></div>'+
      '<div style="margin-top:7px">'+esc(r.body)+'</div>'+(r.action?'<div class="muted" style="margin-top:3px">↳ '+esc(r.action)+'</div>':'')+'</div>';}).join('')+
    (rows.length===0?'<div style="text-align:center;color:var(--slate-400);padding:30px 0">No feedback in this filter.</div>':'');
}

/* ============ 5 · KANBAN ============ */
var dragId=null,dragFrom=null;
function viewBoard(){
  var cols=[["todo","To Do"],["doing","In Progress"],["done","Done"]];var sd=S.profile.staleDays;
  var tot=S.kanban.todo.length+S.kanban.doing.length+S.kanban.done.length||1;
  var dist='<div class="card"><div class="h"><span class="lead">Board distribution</span><span class="muted">'+tot+' cards</span></div><div class="stackbar">'+
    '<div style="flex:'+S.kanban.todo.length+';background:#94a3b8">'+(S.kanban.todo.length||'')+'</div>'+
    '<div style="flex:'+S.kanban.doing.length+';background:#f59e0b">'+(S.kanban.doing.length||'')+'</div>'+
    '<div style="flex:'+S.kanban.done.length+';background:#059669">'+(S.kanban.done.length||'')+'</div></div>'+
    '<div class="legend" style="gap:14px"><span><i style="background:#94a3b8"></i> To Do</span><span><i style="background:#f59e0b"></i> In Progress</span><span><i style="background:#059669"></i> Done</span></div></div>';
  return head("Kanban Board","drag cards between columns · stuck &gt; "+sd+" days gets flagged")+dist+
   '<div class="board" style="margin-top:16px">'+cols.map(function(c){var key=c[0];
     return '<div class="col '+key+'" data-col="'+key+'"><div class="ch"><span>'+c[1]+'</span><span class="cnt">'+S.kanban[key].length+'</span></div>'+
       S.kanban[key].map(function(card){var stale=key==='doing'&&card.enteredAt&&daysBetween(card.enteredAt,today())>sd;var tags='';if(stale)tags+='<span class="pill p-rose">stuck '+daysBetween(card.enteredAt,today())+'d</span>';if(card.due)tags+='<span class="pill p-amber">due '+fmt(card.due)+'</span>';
         var mv='<div class="mv">'+(key!=='todo'?'<button class="bk" data-mv="'+card.id+'|'+key+'|'+(key==='done'?'doing':'todo')+'">←</button>':'')+(key!=='done'?'<button class="to" data-mv="'+card.id+'|'+key+'|'+(key==='todo'?'doing':'done')+'">move →</button>':'')+'</div>';
         return '<div class="kcard'+(stale?' stale':'')+'" draggable="true" data-card="'+card.id+'|'+key+'"><div class="top"><span style="flex:1">'+esc(card.title)+'</span><button class="x" data-delcard="'+card.id+'|'+key+'">×</button></div>'+(tags?'<div class="tags">'+tags+'</div>':'')+mv+'</div>';}).join('')+
       '<div class="addrow" style="margin-top:6px"><input data-newcard="'+key+'" placeholder="+ add card" style="font-size:13px"></div></div>';}).join('')+'</div>';
}

/* ============ 6 · OVERVIEW (dashboard) ============ */
function viewOverview(){
  var st=streak(),t=today(),wk=weekKey();
  // last 30 days DCR completion
  var filled30=0;for(var i=0;i<30;i++){if(S.dcr[addDays(t,-i)])filled30++;}
  var comp30=Math.round(filled30/30*100);
  var openFb=S.feedback.filter(function(r){return r.status==='Pending';}).length;
  var monthDcr=Object.keys(S.dcr).filter(function(d){return d.slice(0,7)===t.slice(0,7);}).length;
  // KPI status
  var kpiBars=S.kpis.map(function(k){var acts=S.kpiActuals[k.id]||{};var keys=Object.keys(acts).sort();var last=keys.length?Number(acts[keys[keys.length-1]]):0;return hbar(k.name,last,k.target,k.dir);}).join('');
  var kpiOn=0;S.kpis.forEach(function(k){var acts=S.kpiActuals[k.id]||{};var keys=Object.keys(acts).sort();var last=keys.length?Number(acts[keys[keys.length-1]]):0;if(k.dir==='up'?last>=k.target:last<=k.target)kpiOn++;});
  // discipline this week avg rule5
  var wdays=Object.keys(S.disc).filter(function(d){return weekKey(d)===wk;});
  var r5avg=wdays.length?Math.round(wdays.reduce(function(a,d){return a+S.disc[d].r5.reduce(function(x,y){return x+y;},0);},0)/wdays.length):0;
  // heatmap
  var weeks=18,start=addDays(t,-weeks*7),cells=[];
  for(var n=0;n<weeks*7;n++){var iso=addDays(start,n);var has=!!S.dcr[iso];var dc=S.disc[iso];var dl=dc?(dc.r5.reduce(function(a,b){return a+b;},0)+(dc.two?1:0)+(dc.tb?1:0)):0;cells.push({iso:iso,lvl:has?(dl>=5?4:dl>=3?3:2):(dl>0?1:0)});}
  var hcols=[];for(var w=0;w<weeks;w++)hcols.push(cells.slice(w*7,w*7+7));
  var fb=S.feedback,pend=fb.filter(function(r){return r.status==='Pending';}).length,doneN=fb.length-pend,tot=fb.length||1;

  return head("Overview","your whole execution system at a glance")+
   '<div class="stats"><div class="stat"><div class="v" style="color:var(--indigo)">'+st.current+'</div><div class="l">current streak 🔥</div></div>'+
     '<div class="stat"><div class="v">'+st.longest+'</div><div class="l">longest streak</div></div>'+
     '<div class="stat"><div class="v" style="color:var(--green)">'+monthDcr+'</div><div class="l">DCRs this month</div></div>'+
     '<div class="stat"><div class="v" style="color:var(--amber)">'+openFb+'</div><div class="l">open feedback</div></div></div>'+
   '<div class="grid2">'+
     '<div class="card" style="margin-top:0"><div class="h"><span class="lead">DCR consistency</span><span class="muted">last 30 days</span></div><div class="donutwrap">'+
       donut([{pct:comp30,color:'var(--indigo)'}],comp30+'%','days filed')+
       legend([{color:'var(--indigo)',label:filled30+' of 30 days filed'},{color:'var(--slate-200)',label:(30-filled30)+' days missed'},{color:'#6366f1',label:'Rule-of-5 avg '+r5avg+'/5 this week'}])+'</div></div>'+
     '<div class="card" style="margin-top:0"><div class="h"><span class="lead">Feedback status</span><span class="muted">'+fb.length+' total</span></div><div class="donutwrap">'+
       donut([{pct:Math.round(doneN/tot*100),color:'var(--green)'},{pct:Math.round(pend/tot*100),color:'var(--amber)'}],Math.round(doneN/tot*100)+'%','closed')+
       legend([{color:'var(--green)',label:'Done · '+doneN},{color:'var(--amber)',label:'Pending · '+pend}])+'</div></div>'+
   '</div>'+
   '<div class="card"><div class="h"><span class="lead">KPI status — latest actual vs target</span><span class="pill '+(kpiOn>=S.kpis.length-1?'p-green':'p-amber')+'">'+kpiOn+'/'+S.kpis.length+' on target</span></div>'+kpiBars+'</div>'+
   '<div class="card"><div class="h"><span class="lead">Day Close heatmap</span><span class="muted">18 weeks</span></div><div class="heat">'+
     hcols.map(function(col){return '<div class="wk">'+col.map(function(c){return '<div class="d'+(c.lvl?' l'+c.lvl:'')+'" title="'+c.iso+'"></div>';}).join('')+'</div>';}).join('')+'</div>'+
     '<div class="legend">Less <i style="background:var(--slate-200)"></i><i style="background:#c7d2fe"></i><i style="background:#a5b4fc"></i><i style="background:#6366f1"></i><i style="background:#4338ca"></i> More</div>'+
     '<div class="muted" style="margin-top:8px">A broken streak is a reset, not a failure. File today to start again.</div></div>';
}

/* ============ event wiring ============ */
function commitDraftInputs(){
  if(current!=='today'||!draft)return;
  var note=document.getElementById('tx-note');if(note)draft.note=note.value;
  var nd=document.getElementById('cx-needle');if(nd)draft.needle=nd.checked;
  document.querySelectorAll('[data-pri]').forEach(function(el){draft.priorities[+el.getAttribute('data-pri')]=el.value;});
  document.querySelectorAll('[data-pdate]').forEach(function(el){var id=el.getAttribute('data-pdate');var p=draft.pending.filter(function(x){return x.id===id;})[0];if(p)p.deadline=el.value;});
}
function wire(){
  document.querySelectorAll('[data-go]').forEach(function(b){b.onclick=function(){go(b.getAttribute('data-go'));};});
  var t=today();
  if(current==='today'){
    document.querySelectorAll('[data-pri]').forEach(function(el){el.oninput=function(){draft.priorities[+el.getAttribute('data-pri')]=el.value;};});
    var note=document.getElementById('tx-note');if(note)note.oninput=function(){draft.note=note.value;};
    var nd=document.getElementById('cx-needle');if(nd)nd.onchange=function(){draft.needle=nd.checked;};
    document.querySelectorAll('[data-pdate]').forEach(function(el){el.onchange=function(){var id=el.getAttribute('data-pdate');var p=draft.pending.filter(function(x){return x.id===id;})[0];if(p)p.deadline=el.value;};});
    var ad=document.querySelector('[data-add-done]');if(ad)ad.onclick=function(){var i=document.getElementById('in-done');if(i.value.trim()){commitDraftInputs();draft.completed.push({id:uid(),t:i.value.trim()});render();}};
    var ap=document.querySelector('[data-add-pend]');if(ap)ap.onclick=function(){var i=document.getElementById('in-pend');if(i.value.trim()){commitDraftInputs();draft.pending.push({id:uid(),t:i.value.trim(),deadline:t});render();}};
    document.querySelectorAll('[data-del-done]').forEach(function(b){b.onclick=function(){commitDraftInputs();var id=b.getAttribute('data-del-done');draft.completed=draft.completed.filter(function(x){return x.id!==id;});render();};});
    document.querySelectorAll('[data-del-pend]').forEach(function(b){b.onclick=function(){commitDraftInputs();var id=b.getAttribute('data-del-pend');draft.pending=draft.pending.filter(function(x){return x.id!==id;});render();};});
    document.querySelectorAll('[data-del-pri]').forEach(function(b){b.onclick=function(){commitDraftInputs();draft.priorities.splice(+b.getAttribute('data-del-pri'),1);render();};});
    var api=document.querySelector('[data-add-pri]');if(api)api.onclick=function(){commitDraftInputs();draft.priorities.push("");render();};
    document.querySelectorAll('[data-r5]').forEach(function(b){b.onclick=function(){var i=+b.getAttribute('data-r5');var d=S.disc[t]||{r5:[0,0,0,0,0],two:0,tb:0};d.r5=d.r5.slice();d.r5[i]=d.r5[i]?0:1;S.disc[t]=d;save();render();};});
    document.querySelectorAll('[data-disc]').forEach(function(b){b.onchange=function(){var k=b.getAttribute('data-disc');var d=S.disc[t]||{r5:[0,0,0,0,0],two:0,tb:0};d[k]=b.checked?1:0;S.disc[t]=d;save();render();};});
    var fbtn=document.querySelector('[data-file]');if(fbtn)fbtn.onclick=function(){commitDraftInputs();var clean=draft.priorities.map(function(p){return p.trim();}).filter(Boolean).slice(0,5);S.dcr[t]={completed:draft.completed,pending:draft.pending,priorities:clean,needle:draft.needle,note:draft.note};
      var have={};["todo","doing","done"].forEach(function(c){S.kanban[c].forEach(function(k){have[k.title]=1;});});draft.pending.forEach(function(p){if(!have[p.t])S.kanban.todo.push({id:uid(),title:p.t,created:t,due:p.deadline});});save();flash(fbtn,"Saved ✓");render();};
  }
  if(current==='weekly'){var sv=document.querySelector('[data-savewk]');if(sv)sv.onclick=function(){var wk=sv.getAttribute('data-savewk');var o={status:'complete'};document.querySelectorAll('[data-wk]').forEach(function(el){o[el.getAttribute('data-wk')]=el.value;});S.weekly[wk]=o;save();flash(sv,"Saved ✓");render();};}
  if(current==='kpi'){
    document.querySelectorAll('[data-kpi]').forEach(function(inp){inp.onchange=function(){var id=inp.getAttribute('data-kpi');if(!S.kpiActuals[id])S.kpiActuals[id]={};S.kpiActuals[id][weekKey()]=inp.value;save();render();};});
    document.querySelectorAll('[data-delkpi]').forEach(function(b){b.onclick=function(){var id=b.getAttribute('data-delkpi');S.kpis=S.kpis.filter(function(k){return k.id!==id;});save();render();};});
    var sk=document.querySelector('[data-showkpi]');if(sk)sk.onclick=function(){document.getElementById('kpi-add').style.display='block';sk.style.display='none';};
    var svk=document.querySelector('[data-savekpi]');if(svk)svk.onclick=function(){var n=document.getElementById('nk-name').value.trim();if(!n)return;S.kpis.push({id:uid(),name:n,unit:document.getElementById('nk-unit').value,target:Number(document.getElementById('nk-target').value)||0,dir:document.getElementById('nk-dir').value});save();render();};
  }
  if(current==='feedback'){
    var afb=document.querySelector('[data-addfb]');if(afb)afb.onclick=function(){var body=document.getElementById('fb-body').value.trim();if(!body)return;S.feedback.unshift({id:uid(),date:today(),type:document.getElementById('fb-type').value,body:body,action:document.getElementById('fb-action').value,assignee:document.getElementById('fb-assign').value,status:'Pending'});save();render();};
    document.querySelectorAll('[data-filter]').forEach(function(b){b.onclick=function(){fbFilter=b.getAttribute('data-filter');render();};});
    document.querySelectorAll('[data-togfb]').forEach(function(b){b.onclick=function(){var id=b.getAttribute('data-togfb');S.feedback.forEach(function(r){if(r.id===id)r.status=r.status==='Done'?'Pending':'Done';});save();render();};});
    document.querySelectorAll('[data-delfb]').forEach(function(b){b.onclick=function(){var id=b.getAttribute('data-delfb');S.feedback=S.feedback.filter(function(r){return r.id!==id;});save();render();};});
  }
  if(current==='board'){
    document.querySelectorAll('[data-mv]').forEach(function(b){b.onclick=function(){var p=b.getAttribute('data-mv').split('|');moveCard(p[0],p[1],p[2]);};});
    document.querySelectorAll('[data-delcard]').forEach(function(b){b.onclick=function(){var p=b.getAttribute('data-delcard').split('|');S.kanban[p[1]]=S.kanban[p[1]].filter(function(c){return c.id!==p[0];});save();render();};});
    document.querySelectorAll('[data-newcard]').forEach(function(inp){inp.onkeydown=function(e){if(e.key==='Enter'&&inp.value.trim()){var col=inp.getAttribute('data-newcard');S.kanban[col].push({id:uid(),title:inp.value.trim(),created:t,enteredAt:col==='doing'?t:undefined});save();render();}};});
    document.querySelectorAll('[data-card]').forEach(function(c){c.ondragstart=function(){var p=c.getAttribute('data-card').split('|');dragId=p[0];dragFrom=p[1];};});
    document.querySelectorAll('[data-col]').forEach(function(col){col.ondragover=function(e){e.preventDefault();col.classList.add('drag');};col.ondragleave=function(){col.classList.remove('drag');};col.ondrop=function(e){e.preventDefault();col.classList.remove('drag');if(dragId)moveCard(dragId,dragFrom,col.getAttribute('data-col'));dragId=null;};});
  }
}
function moveCard(id,from,to){if(from===to)return;var card=S.kanban[from].filter(function(c){return c.id===id;})[0];if(!card)return;S.kanban[from]=S.kanban[from].filter(function(c){return c.id!==id;});if(to==='doing')card.enteredAt=today();S.kanban[to].push(card);save();render();}
function flash(btn,msg){var o=btn.textContent;btn.textContent=msg;setTimeout(function(){try{btn.textContent=o;}catch(e){}},700);}
render();
</script>
</body>
</html>
